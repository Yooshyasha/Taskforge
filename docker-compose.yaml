networks:
  app:

services:
  ai-service:
    build:
      dockerfile: ai-service/Dockerfile
    env_file:
      - .env
    networks:
      - app
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
  backend:
    build:
      dockerfile: backend/Dockerfile
    environment:
      - feign.clients.aiServiceClient.url=http://ai-service
    env_file:
      - .env
    networks:
      - app
    ports:
      - "8080:8080"
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s